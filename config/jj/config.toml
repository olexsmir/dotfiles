#:schema https://jj-vcs.github.io/jj/latest/config-schema.json

[user]
name = "Oleksandr Smirnov"
email = "olexsmir@gmail.com"

[ui]
default-command = "l"
editor = "nvim"
pager = "delta"
diff-editor = ":builtin"
diff-formatter = ":git"

[signing]
backend = "ssh"
key = "~/.ssh/git-sign.pub"

[git]
sign-on-push = true
private-commits = "private()"

[remotes]
origin.auto-track-bookmarks = "glob:*"
olexsmir.auto-track-bookmarks = "glob:*"
upstream.auto-track-bookmarks = "main | master"

[aliases]
e = ["edit"]
l = ["log", "-r", "ancestors(reachable(@, mutable()), 2)"]
llog = ["log", "-r", ".."]
n = ["new"]
restack = ["rebase", "-d", "trunk()", "-s", "mutable_roots()"]
tug = ["bookmark", "move", "--from", "closest_bookmark(@)", "--to", "closest_pushable(@)"]

[revset-aliases]
"private()" = "description(glob:'private:*') | description(glob:'wip:*')"
"mutable_roots()" = "roots(trunk()..) & mutable()"
"closest_bookmark(to)" = "heads(::to & bookmarks())"
"closest_pushable(to)" = "heads(::to & ~description(exact:'') & (~empty() | merges()))"

[templates]
git_push_bookmark = '"olexsmir/" ++ change_id.short()'
draft_commit_description = '''
concat(
  coalesce(description, default_commit_description, "\n"),
  "JJ: ignore-rest\n",
  diff.git(),
)
'''

[template-aliases]
"format_timestamp(timestamp)" = "timestamp.ago()"

[fix.tools.stylua]
command = ["stylua", "-"]
patterns = ["glob:'**/*.lua'"]

[fix.tools.gofumpt]
command = ["gofumpt"]
patterns = ["glob:'**/*.go'"]

[fix.tools.gleam]
command = ["gleam", "format", "--stdin"]
patterns = ["glob:'**/*.gleam'"]

[fix.tools.shfmt]
command = ["shfmt"]
patterns = ["glob:'**/*.sh'"]
