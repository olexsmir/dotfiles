#:schema https://jj-vcs.github.io/jj/latest/config-schema.json

[user]
name = "Oleksandr Smirnov"
email = "olexsmir@gmail.com"

[ui]
default-command = ["log", "-r", "stack()"]
editor = "nvim"
pager = "delta"
diff-editor = ":builtin"
diff-formatter = ":git"

[signing]
backend = "ssh"
key = "~/.ssh/git-sign.pub"

[git]
sign-on-push = true
private-commits = "private()"

[remotes]
origin.auto-track-bookmarks = "*"
olexsmir.auto-track-bookmarks = "*"
upstream.auto-track-bookmarks = "main | master"

[aliases]
e = ["edit"]
llog = ["log", "-r", ".."]
restack = ["rebase", "-d", "trunk()", "-s", "mutable_roots()", "--simplify-parents"]
solve = ["resolve", "--tool", "mergiraf"]
sync = ["util", "exec", "--", "sh", "-c", "jj git fetch && jj rebase -d 'trunk()'"]
tug = ["bookmark", "advance"]

[revsets]
bookmark-advance-to = "closest_pushable(@)"
bookmark-advance-from = "closest_bookmark(@)"

[revset-aliases]
"private()" = "description(glob:'private:*') | description(glob:'wip:*')"
"stack()" = "ancestors(reachable(@, mutable()), 2)"
"user(x)" = "author(x) | committer(x)"
"mutable_roots()" = "roots(trunk()..) & mutable()"
"closest_bookmark(to)" = "heads(::to & bookmarks())"
"closest_pushable(to)" = "heads(::to & ~description(exact:'') & (~empty() | merges()))"

[templates]
git_push_bookmark = '"olex/" ++ change_id.short()'
draft_commit_description = "builtin_draft_commit_description_with_diff"

[template-aliases]
"format_timestamp(timestamp)" = "timestamp.ago()"

[fix.tools.stylua]
command = ["stylua", "-"]
patterns = ["glob:'**/*.lua'"]

[fix.tools.gofumpt]
command = ["gofumpt"]
patterns = ["glob:'**/*.go'"]

[fix.tools.goimports]
command = ["goimports"]
patterns = ["glob:'**/*.go'"]

[fix.tools.gleam]
command = ["gleam", "format", "--stdin"]
patterns = ["glob:'**/*.gleam'"]

[fix.tools.shfmt]
command = ["shfmt"]
patterns = ["glob:'**/*.sh'"]
